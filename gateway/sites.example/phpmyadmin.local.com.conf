# ssl_certificate: /etc/nginx/certs/__SSL_CERT_BASENAME__.crt — thay khi copy (make init-sites / gen-sites)
# phpMyAdmin → http://phpmyadmin:80 (TLS termination tại gateway)
server {
    listen 80;
    server_name phpmyadmin.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name phpmyadmin.local.com;
    ssl_certificate /etc/nginx/certs/__SSL_CERT_BASENAME__.crt;
    ssl_certificate_key /etc/nginx/certs/__SSL_CERT_BASENAME__.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 512M;
    location / {
        proxy_connect_timeout 600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
        proxy_request_buffering off;
        set $pma_upstream http://phpmyadmin:80;
        proxy_http_version 1.1;
        proxy_pass $pma_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }
}
