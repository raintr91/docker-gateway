# ssl_certificate: /etc/nginx/certs/__SSL_CERT_BASENAME__.crt — thay khi copy (make init-sites / gen-sites)
# StackPort — LocalStack S3/SQS/SNS UI
server {
    listen 80;
    server_name stackport.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name stackport.local.com;
    ssl_certificate /etc/nginx/certs/__SSL_CERT_BASENAME__.crt;
    ssl_certificate_key /etc/nginx/certs/__SSL_CERT_BASENAME__.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
        set $u stackport;
        proxy_http_version 1.1;
        proxy_pass http://$u:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Frame-Options;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }
}
