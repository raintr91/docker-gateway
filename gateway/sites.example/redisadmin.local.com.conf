# Redis Commander → http://redis-commander:8081 (TLS termination tại gateway)
server {
    listen 80;
    server_name redisadmin.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name redisadmin.local.com;
    ssl_certificate /etc/nginx/certs/dev-server.fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/dev-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
        set $redisadmin_upstream http://redis-commander:8081;
        proxy_http_version 1.1;
        proxy_pass $redisadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }
}
