# API saas-api.local.com → saas-api-nginx:80 (Docker network) (proxy Host: saas-api.local.com)
server {
    listen 80;
    server_name saas-api.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name saas-api.local.com;
    ssl_certificate /etc/nginx/certs/dev-server.fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/dev-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # PHPUnit HTML report — relative redirect keeps the browser on saas-api.local.com.
    location = /coverage/ {
        return 301 /coverage;
    }

    location = /coverage {
        set $api_upstream http://saas-api-nginx:80;
        proxy_http_version 1.1;
        proxy_pass $api_upstream;
        proxy_set_header Host saas-api.local.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }

    location ^~ /coverage/ {
        set $api_upstream http://saas-api-nginx:80;
        proxy_http_version 1.1;
        proxy_pass $api_upstream;
        proxy_set_header Host saas-api.local.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }

    location / {
        set $api_upstream http://saas-api-nginx:80;
        proxy_http_version 1.1;
        proxy_pass $api_upstream;
        proxy_set_header Host saas-api.local.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }
}
