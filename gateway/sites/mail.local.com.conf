# Mailpit UI — docker-compose.services mailpit
server {
    listen 80;
    server_name mail.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name mail.local.com;
    ssl_certificate /etc/nginx/certs/dev-server.fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/dev-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
        set $u mailpit;
        proxy_http_version 1.1;
        proxy_pass http://$u:8025;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Frame-Options;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }
}
