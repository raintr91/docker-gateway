# External Nuxt mairy-store.local.com → dev_external_frontend_node:3001 (Docker network)
server {
    listen 80;
    server_name mairy-store.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name mairy-store.local.com;
    ssl_certificate /etc/nginx/certs/dev-server.fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/dev-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
        set $node_upstream http://dev_external_frontend_node:3001;
        proxy_pass $node_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
