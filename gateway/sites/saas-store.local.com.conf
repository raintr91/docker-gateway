# Portal saas-store.local.com → saas-store-portal-node:3000 (Docker network)
server {
    listen 80;
    server_name saas-store.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name saas-store.local.com;
    ssl_certificate /etc/nginx/certs/dev-server.fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/dev-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
        set $portal_upstream http://saas-store-portal-node:3000;
        proxy_pass $portal_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
