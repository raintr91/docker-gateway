# Web mairy-admin.local.com → http://dev_external_nginx:8082 (proxy Host: mairy-admin.local.com; EXTERNAL_GATEWAY_PROXY=container)
server {
    listen 80;
    server_name mairy-admin.local.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name mairy-admin.local.com;
    ssl_certificate /etc/nginx/certs/dev-server.fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/dev-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
  resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
    set $web_upstream http://dev_external_nginx:8082;
        proxy_http_version 1.1;
    proxy_pass $web_upstream;
        proxy_set_header Host mairy-admin.local.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;
    }
}
