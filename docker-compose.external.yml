# Legacy stacks: mairy-backend, mairy-fullsco, mairy-scenario, mairy-frontend.
# Cần mạng base_shared_net: make d-up + make d-services-up trước (gateway alias *.local.com).
# mairy-backend .env: SCENARIO_SURVEY_SERVICE_URL=https://mairy-fullsco.local.com/... (không dùng external-nginx:8081).
#
#   make external-up   # backend + fullsco + scenario + frontend + scheduler + queue workers
#   make external-crawler-up   # mairy-crawl (file docker-compose.external.crawler.yml)
#   make gw
#
# Cổng host:
#   fullsco   → EXTERNAL_PHP82_PORT (18081)
#   scenario  → EXTERNAL_PHP82_SCENARIO_PORT (18084) — cùng PHP-FPM 8.2 với fullsco
#   backend   → EXTERNAL_PHP83_PORT (18082)
#   store     → EXTERNAL_NODE_PORT (3001)

name: ${PROJECT_NAME:-local_dev}-external

services:
  external-php-82:
    build:
      context: ./external
      dockerfile: php-82/Dockerfile
    container_name: ${PROJECT_NAME:-local_dev}_external_php_82
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/mairy-fullsco
    volumes:
      - ../mairy-fullsco:/var/www/mairy-fullsco
      - ../mairy-scenario:/var/www/mairy-scenario
      - ./external/php/local-82.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - ./certs/combined-ca.pem:/etc/ssl/certs/combined-ca.pem:ro
    networks:
      - base-shared

  external-php-83:
    build:
      context: ./external
      dockerfile: php-83/Dockerfile
    container_name: ${PROJECT_NAME:-local_dev}_external_php_83
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/mairy-backend
    volumes:
      - ../mairy-backend:/var/www/mairy-backend
      - ./external/php/local-83.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - ./certs/combined-ca.pem:/etc/ssl/certs/combined-ca.pem:ro
    networks:
      - base-shared

  # Thay crontab prod (* * * * * schedule:run) — tự chạy khi make external-up
  external-backend-scheduler:
    build:
      context: ./external
      dockerfile: php-83/Dockerfile
    container_name: ${PROJECT_NAME:-local_dev}_external_backend_scheduler
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/mairy-backend
    restart: unless-stopped
    volumes:
      - ../mairy-backend:/var/www/mairy-backend
      - ./external/php/local-83.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - ./certs/combined-ca.pem:/etc/ssl/certs/combined-ca.pem:ro
      - ./external/php/laravel-scheduler.sh:/usr/local/bin/laravel-scheduler.sh:ro
    environment:
      LARAVEL_SCHEDULER_APP_DIR: /var/www/mairy-backend
      TZ: Asia/Tokyo
    command: ["/bin/sh", "/usr/local/bin/laravel-scheduler.sh"]
    depends_on:
      - external-php-83
    networks:
      - base-shared

  # Supervisor queue workers (prod: mairy.conf) — sqs-fifo → LocalStack
  external-backend-worker:
    build:
      context: ./external
      dockerfile: php-83/Dockerfile
    container_name: ${PROJECT_NAME:-local_dev}_external_backend_worker
    user: "0:0"
    working_dir: /var/www/mairy-backend
    restart: unless-stopped
    volumes:
      - ../mairy-backend:/var/www/mairy-backend
      - ./external/php/local-83.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - ./certs/combined-ca.pem:/etc/ssl/certs/combined-ca.pem:ro
      - ./external/supervisor/mairy-backend.conf:/etc/supervisor/conf.d/mairy-backend.conf:ro
    environment:
      TZ: Asia/Tokyo
    command: ["/usr/bin/supervisord", "-n", "-c", "/etc/supervisor/conf.d/mairy-backend.conf"]
    depends_on:
      - external-php-83
    networks:
      - base-shared

  external-nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME:-local_dev}_external_nginx
    depends_on:
      - external-php-82
      - external-php-83
    volumes:
      - ../mairy-fullsco:/var/www/mairy-fullsco:ro
      - ../mairy-scenario:/var/www/mairy-scenario:ro
      - ../mairy-backend:/var/www/mairy-backend:ro
      - ./external/nginx/00-proxy-https-map.conf:/etc/nginx/conf.d/00-proxy-https-map.conf:ro
      - ./external/nginx/mairy-fullsco.conf:/etc/nginx/conf.d/mairy-fullsco.conf:ro
      - ./external/nginx/mairy-scenario.conf:/etc/nginx/conf.d/mairy-scenario.conf:ro
      - ./external/nginx/mairy-backend.conf:/etc/nginx/conf.d/mairy-backend.conf:ro
    ports:
      - "${EXTERNAL_PHP82_PORT:-18081}:8081"
      - "${EXTERNAL_PHP82_SCENARIO_PORT:-18084}:8084"
      - "${EXTERNAL_PHP83_PORT:-18082}:8082"
    networks:
      - base-shared

  external-frontend-node:
    # Node 18 + npm (package-lock.json) — tránh corepack/pnpm lỗi trên Node 18.
    image: node:18
    container_name: ${PROJECT_NAME:-local_dev}_external_frontend_node
    user: "0:0"
    working_dir: /workspace/mairy-frontend
    command:
      - /usr/local/bin/entrypoint-dev.sh
      - /usr/local/bin/frontend-dev.sh
    env_file:
      - ../mairy-frontend/.env
    environment:
      HOST_UID: "${HOST_UID:-1000}"
      HOST_GID: "${HOST_GID:-1000}"
      EXTERNAL_NODE_PORT: "${EXTERNAL_NODE_PORT:-3001}"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
      WATCHPACK_POLLING: "true"
      NUXT_DEVTOOLS: "false"
      NUXT_PORT: "${EXTERNAL_NODE_PORT:-3001}"
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/cache
      XDG_CONFIG_HOME: /tmp/config
      # devProxy (server): nginx PHP trong Docker. Browser: BACKEND_DOMAIN trong mairy-frontend/.env
      BACKEND_PROXY_TARGET: ${MAIRY_BACKEND_PROXY_TARGET:-http://external-nginx:8082}
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: mairy-store.local.com
    volumes:
      - ../mairy-frontend:/workspace/mairy-frontend
      - ./external/node/entrypoint-dev.sh:/usr/local/bin/entrypoint-dev.sh:ro
      - ./external/node/frontend-dev.sh:/usr/local/bin/frontend-dev.sh:ro
      - external_frontend_node_modules:/workspace/mairy-frontend/node_modules
    ports:
      - "${EXTERNAL_NODE_PORT:-3001}:${EXTERNAL_NODE_PORT:-3001}"
    networks:
      - base-shared

networks:
  base-shared:
    name: ${BASE_SHARED_NETWORK_NAME:-base_shared_net}
    external: true

volumes:
  external_frontend_node_modules:
    name: ${PROJECT_NAME:-local_dev}_external_frontend_node_modules
