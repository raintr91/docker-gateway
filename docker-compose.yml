# Hạ tầng chung: MySQL + phpMyAdmin + PostgreSQL + pgAdmin + gateway (API/portal TLS 443).
#   docker compose up -d --remove-orphans
#   make d-up   hoặc   docker compose up -d --remove-orphans
#
# Cấu hình gateway: chỉnh routes.json rồi
#   make gen-sites   (mỗi domain một file trong gateway/sites/)
# hoặc make gen-ssl (cert + sites). Mount sites → /etc/nginx/conf.d.

services:
  gateway-nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME:-local_dev}_gateway_nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./gateway/sites:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      base-shared:
        # Container trên base_shared_net gọi https://*.local.com qua gateway (DNS alias → IP gateway).
        # Không dùng 127.0.0.1 từ /etc/hosts host — trong container đó là chính container, không phải gateway.
        aliases:
          # BEGIN gateway-aliases (generated — make gen-sites)
          - api-base.local.com
          - bandai-namco-api.local.com
          - bandai-namco-chain.local.com
          - bandai-namco-store.local.com
          - laravel.api.com
          - mail.local.com
          - mairy-admin.local.com
          - mairy-fullsco.local.com
          - mairy-scenario.local.com
          - mairy-store.local.com
          - mock.local.com
          - one-crm-admin.local.com
          - one-crm-api.local.com
          - one-crm-chain.local.com
          - one-crm-store.local.com
          - pgadmin.local.com
          - phpmyadmin.local.com
          - portal-base.local.com
          - redisadmin.local.com
          - saas-admin.local.com
          - saas-api.local.com
          - saas-chain.local.com
          - saas-store.local.com
          - stackport.local.com
          # END gateway-aliases

  # UI MySQL (phpmyadmin/phpmyadmin). HTTPS: https://phpmyadmin.local.com (gateway/sites/phpmyadmin.local.com.conf).
  # Đăng nhập: chọn server trên form (MySQL 8.4 hoặc MySQL 8.0).
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: ${PROJECT_NAME:-local_dev}_phpmyadmin
    depends_on:
      - mysql
    environment:
      PMA_HOSTS: mysql,mysql-80
      PMA_PORTS: 3306,3306
      PMA_VERBOSES: MySQL 8.4,MySQL 8.0
      PMA_ABSOLUTE_URI: https://phpmyadmin.local.com/
      UPLOAD_LIMIT: ${PMA_UPLOAD_LIMIT:-512M}
      MEMORY_LIMIT: ${PMA_MEMORY_LIMIT:-512M}
      MAX_EXECUTION_TIME: ${PMA_MAX_EXECUTION_TIME:-3600}
    networks:
      - base-shared

  mysql:
    image: mysql:8.4
    container_name: ${PROJECT_NAME:-local_dev}_mysql
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DB_LOCAL: ${MYSQL_DB_LOCAL:-db_local}
      MYSQL_DB_TEST: ${MYSQL_DB_TEST:-laravel_test}
      MYSQL_APP_USER: ${MYSQL_APP_USER:-smart}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:-smart}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/initdb:/docker-entrypoint-initdb.d:ro
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - base-shared

  # PostgreSQL 17. App/container trên base_shared_net: host postgres hoặc alias saas-postgres:5432.
  postgres:
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME:-local_dev}_postgres
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: ${POSTGRES_DB:-one_crm}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      base-shared:
        aliases:
          - saas-postgres

  # UI PostgreSQL (pgAdmin). HTTPS: https://pgadmin.local.com (gateway/sites/pgadmin.local.com.conf).
  # Đăng nhập pgAdmin: PGADMIN_DEFAULT_EMAIL / PGADMIN_DEFAULT_PASSWORD trong docker/.env.
  # Thêm server: Host postgres (hoặc saas-postgres), port 5432, user/pass POSTGRES_*.
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ${PROJECT_NAME:-local_dev}_pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: '1'
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: '1'
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: '1'
    networks:
      - base-shared

networks:
  base-shared:
    name: ${BASE_SHARED_NETWORK_NAME:-base_shared_net}
    driver: bridge

volumes:
  mysql_data:
    name: ${PROJECT_NAME:-local_dev}_mysql_data
  postgres_data:
    name: ${PROJECT_NAME:-local_dev}_postgres_data
