server {
    listen 80;
    server_name laravel.api.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name laravel.api.com;

    ssl_certificate /etc/nginx/certs/__SSL_CERT_BASENAME__.crt;
    ssl_certificate_key /etc/nginx/certs/__SSL_CERT_BASENAME__.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /var/www/api/src/public;
    index index.php index.html;

    location = /coverage/ {
        return 301 /coverage;
    }

    location = /coverage {
        alias /var/www/api/src/coverage/index.html;
        default_type text/html;
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '<head>' '<head><base href="/coverage/">';
    }

    location ^~ /coverage/ {
        alias /var/www/api/src/coverage/;
        index index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        set $php_upstream api-php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}
